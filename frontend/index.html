<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Othello AI Agents</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar controls -->
        <aside class="sidebar">
            <h1>Othello AI</h1>
            
            <div class="control-group">
                <label for="mode-select">Game Mode</label>
                <select id="mode-select">
                    <option value="agent_vs_agent">Agent vs Agent</option>
                    <option value="human_vs_agent">Human vs Agent A</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Host (Agent C):</label>
                <select id="host-type">
                    <option value="programmatic">Programmatic (Fast)</option>
                    <option value="llm">LLM (Gemini)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Memory Limit:</label>
                <select id="memory-limit">
                    <option value="-1">Indefinitely</option>
                    <option value="1">Last 1 lesson</option>
                    <option value="3">Last 3 lessons</option>
                    <option value="5">Last 5 lessons</option>
                    <option value="0">Disabled (0)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="time-slider">Min Move Time (<span id="time-val">2</span>s)</label>
                <input type="range" id="time-slider" min="0" max="10" step="1" value="2">
            </div>
            
            <div class="actions">
                <button id="btn-start" class="btn primary">Start Game</button>
                <button id="btn-abort" class="btn danger" disabled>Abort Game</button>
            </div>
            
            <div class="status-panel">
                <h3>Status: <span id="game-status">Idle</span></h3>
                <div class="score">
                    <div>Black (1): <span id="score-black">2</span></div>
                    <div>White (-1): <span id="score-white">2</span></div>
                </div>
                <div id="current-turn"></div>
            </div>
            
            <div class="stream-toggles">
                <h3>View Streams</h3>
                <label><input type="checkbox" id="toggle-agent-a" checked> Agent A (Black)</label>
                <label><input type="checkbox" id="toggle-agent-b" checked> Agent B (White)</label>
                <label><input type="checkbox" id="toggle-agent-c" checked> Agent C (Host)</label>
            </div>
        </aside>

        <!-- Main Board Area -->
        <main class="board-area">
            <div class="board" id="othello-board">
                <!-- Grid generated by JS -->
            </div>
        </main>

        <!-- Streams Area -->
        <div class="streams-section-wrapper">
            <!-- Global Nav -->
            <div class="global-nav">
                <span>View Round:</span>
                <div class="stream-nav">
                    <button onclick="navGlobal('first')">|&lt;</button>
                    <button onclick="navGlobal('prev')">&lt;</button>
                    <select id="global-select" onchange="navGlobal('goto', this.value)">
                        <option value="latest">Latest</option>
                    </select>
                    <button onclick="navGlobal('next')">&gt;</button>
                    <button onclick="navGlobal('last')">&gt;|</button>
                </div>
            </div>
            
            <div class="streams-and-aux">
                <div class="stream-panel" id="panel-agent-a">
                    <div class="stream-header">
                        <span>Agent A (Black)</span>
                    </div>
                    <div class="stream-content" id="stream-content-a"></div>
                </div>
                <div class="stream-panel" id="panel-agent-b">
                    <div class="stream-header">
                        <span>Agent B (White)</span>
                    </div>
                    <div class="stream-content" id="stream-content-b"></div>
                </div>
                <!-- Auxiliary Board Black (Lower Left) -->
                <div class="aux-board-container" id="aux-container-black" style="display: none;">
                    <div class="aux-header">After Black's Move</div>
                    <div class="board mini-board" id="aux-board-black"></div>
                    <div class="aux-footer">
                        <span class="dot" style="background:transparent; border:2px solid #fbbf24; box-shadow:0 0 5px #fbbf24;"></span> Placed
                        <span class="dot" style="background:transparent; box-shadow:0 0 8px #0ea5e9;"></span> Flipped
                    </div>
                </div>
                
                <!-- Auxiliary Board White (Lower Right) -->
                <div class="aux-board-container" id="aux-container-white" style="display: none;">
                    <div class="aux-header">After White's Move</div>
                    <div class="board mini-board" id="aux-board-white"></div>
                    <div class="aux-footer">
                        <span class="dot" style="background:transparent; border:2px solid #fbbf24; box-shadow:0 0 5px #fbbf24;"></span> Placed
                        <span class="dot" style="background:transparent; box-shadow:0 0 8px #f87171;"></span> Flipped
                    </div>
                </div>

                <div class="stream-panel" id="panel-agent-c">
                    <div class="stream-header">
                        <span>Agent C (Host)</span>
                    </div>
                    <div class="stream-content" id="stream-content-c"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
